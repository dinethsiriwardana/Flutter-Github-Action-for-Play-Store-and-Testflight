name: Setup Job
on:
  workflow_call:
    outputs:
      build_number:
        description: "The incremented build number"
        value: ${{ jobs.setup.outputs.build_number }}
      version_name:
        description: "The computed version name"
        value: ${{ jobs.setup.outputs.version_name }}

jobs:
  setup:
    name: 🔧 Setup & Version Bump
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      build_number: ${{ steps.version_info.outputs.build_number }}
      version_name: ${{ steps.version_info.outputs.version_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump version
        id: version_info
        uses: ./.github/actions/bump-version
        with:
          gh_token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Fetch PR Description for Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls -q '.[0].body' 2>/dev/null)
          if [ -z "$PR_BODY" ]; then
            PR_BODY=$(gh pr list --state merged --base release --limit 1 --json body -q '.[0].body' 2>/dev/null)
          fi
          if [ -z "$PR_BODY" ]; then
            PR_BODY="Automated release from commit ${{ github.sha }}"
          fi
          echo "$PR_BODY" > release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 1

      - name: Setup Flutter environment
        uses: ./.github/actions/setup-flutter-env
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION }}

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run Tests
        run: flutter test

      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: lib/
          if-no-files-found: ignore
          retention-days: 1
